name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Copy public folder to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          # Preserve existing gh-pages files (index.html, admin.html, .nojekyll)
          # Copy any new static assets from public/
          if [ -d "../main/public" ]; then
            cp -r ../main/public/* . 2>/dev/null || true
          fi
          git add -A
          git diff --cached --quiet || git commit -m "chore: sync static assets from main [skip ci]"
          git push origin gh-pages
