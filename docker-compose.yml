version: '3.8'

services:
  kbank-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kbank-bot
    restart: unless-stopped
    ports:
      - "3000:3000"   # Main application port
      - "3001:3001"   # Insurance bridge health check
    environment:
      - NODE_ENV=production
      - BOT_TOKEN=${BOT_TOKEN}
      - FLOW_NETWORK=${FLOW_NETWORK:-testnet}
      - WALLET_CONNECT_CLIENT_ID=${WALLET_CONNECT_CLIENT_ID}
      - WALLET_CONNECT_CLIENT_SECRET=${WALLET_CONNECT_CLIENT_SECRET}
      - INSURANCE_API_URL=${INSURANCE_API_URL}
      - INSURANCE_API_KEY=${INSURANCE_API_KEY}
      - INSURANCE_CONTRACT_ADDRESS=${INSURANCE_CONTRACT_ADDRESS:-0xInsuranceContract}
      - INSURANCE_COVERAGE_AMOUNT=${INSURANCE_COVERAGE_AMOUNT:-1000000}
      - INSURANCE_PREMIUM_RATE=${INSURANCE_PREMIUM_RATE:-0.001}
      - PORT=3000
      - INSURANCE_PORT=3001
      - RECEIPT_PERSISTENCE_PATH=/app/data/receipts.json
      - RECEIPT_SAVE_INTERVAL=${RECEIPT_SAVE_INTERVAL:-300000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-10}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - receipt_data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kbank-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

