version: '3.8'

services:
  kbank-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kbank-poc:latest
    container_name: kbank-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - NETWORK=${NETWORK:-testnet}
      - TESTNET_MODE=${TESTNET_MODE:-true}
      - SANDBOX_ENABLED=${SANDBOX_ENABLED:-true}
      - BOT_TOKEN=${BOT_TOKEN}
      - FLOW_NETWORK=${FLOW_NETWORK:-testnet}
      - FLOW_RPC_URL=https://access-testnet.onflow.org
      - FLOW_REST_URL=https://rest-testnet.onflow.org
      - WALLET_CONNECT_CLIENT_ID=${WALLET_CONNECT_CLIENT_ID:-test-client}
      - WALLET_CONNECT_CLIENT_SECRET=${WALLET_CONNECT_CLIENT_SECRET:-test-secret}
      - INSURANCE_API_URL=${INSURANCE_API_URL:-https://api.nexusmutual.io}
      - INSURANCE_API_KEY=${INSURANCE_API_KEY:-test-key}
      - PORT=3000
      - INSURANCE_PORT=3001
      - HEALTH_PORT=3002
      - RECEIPT_PERSISTENCE_PATH=/app/data/receipts.json
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_DIR=/app/logs
    volumes:
      - kbank_data:/app/data
      - kbank_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - kbank-network

  redis:
    image: redis:7-alpine
    container_name: kbank-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kbank-network

  prometheus:
    image: prom/prometheus:latest
    container_name: kbank-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - kbank-network

  grafana:
    image: grafana/grafana:latest
    container_name: kbank-grafana
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - kbank-network

networks:
  kbank-network:
    driver: bridge

volumes:
  kbank_data:
  kbank_logs:
  redis_data:
  prometheus_data:
  grafana_data:
